name: Build Unsigned IPA

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest  # 使用 GitHub 的 macOS 环境（自带 Xcode）
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare Secrets Config
        run: |
          cp Secrets.xcconfig.example Secrets.xcconfig
          # 从 GitHub Secrets 读取 API 地址（后面会教设置）
          sed -i '' "s|https:/$()/your-ncm-server.com|${API_BASE_URL}|g" Secrets.xcconfig
          sed -i '' "s|http:/$()/your-qq-server:8000|${QQ_MUSIC_BASE_URL}|g" Secrets.xcconfig
          sed -i '' "s|http:/$()/your-unblock-server:4000|${UNBLOCK_SERVER_URL}|g" Secrets.xcconfig

      - name: Build IPA with Script
        run: |
          chmod +x build_ipa.sh
          ./build_ipa.sh

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsideMusic-unsigned
          path: "*.ipa"
